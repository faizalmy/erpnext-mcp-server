# erpnext-mcp-server Docker Compose
#
# Standalone MCP server — serves 250+ ERPNext tools over Streamable HTTP.
#
# Usage:
#   cp .env.example .env && vi .env   # configure ERPNext credentials
#   docker compose up -d              # start
#   docker compose up -d --build      # rebuild + start
#   docker compose logs -f            # tail logs
#   docker compose down               # stop

services:
  mcp-server:
    build: .
    container_name: ai-erp-mcp
    ports:
      - "8090:3000"
    environment:
      # ERPNext connection
      ERPNEXT_URL: "${ERPNEXT_URL:-http://host.docker.internal:8080}"
      ERPNEXT_API_KEY: "${ERPNEXT_API_KEY:-}"
      ERPNEXT_API_SECRET: "${ERPNEXT_API_SECRET:-}"
      ERPNEXT_USR: "${ERPNEXT_USR:-Administrator}"
      ERPNEXT_PWD: "${ERPNEXT_PWD:-admin}"
      # HTTP transport settings
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "3000"
      # HTTP transport auth (empty = no auth)
      MCP_API_KEY: "${MCP_API_KEY:-}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
